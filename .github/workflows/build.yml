# GitHub Actions Workflow for building and testing the plugin on every push and pull request.
#
# GitHub Actions reference: https://help.github.com/en/actions

name: Build

on:
  # Trigger on pushes to any branch (avoids duplicate runs for dependabot PRs via the push trigger alone)
  push:
    branches: ["**"]
  # Trigger on any pull request
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  # Build the plugin and upload the artifact
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:

      # Free GitHub Actions Environment Disk Space
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@v5

      # Set up the Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      # Ensure Gradle wrapper has execute permission on Linux runners
      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      # Setup Gradle (handles caching automatically)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      # Build the plugin
      - name: Build Plugin
        run: ./gradlew buildPlugin --stacktrace

      # Prepare plugin archive content for creating artifact
      - name: Prepare Plugin Artifact
        id: artifact
        shell: bash
        run: |
          cd ${{ github.workspace }}/build/distributions
          FILENAME=`ls *.zip`
          unzip "$FILENAME" -d content
          echo "filename=${FILENAME:0:-4}" >> $GITHUB_OUTPUT

      # Store the built plugin as an artifact for downloading
      - name: Upload Artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.artifact.outputs.filename }}
          path: ./build/distributions/content/*/*

  # Run tests and upload results on failure
  test:
    name: Test
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:

      # Free GitHub Actions Environment Disk Space
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@v5

      # Set up the Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      # Ensure Gradle wrapper has execute permission on Linux runners
      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      # Setup Gradle (read-only cache since build job populated it)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: true

      # Test the release version helper script
      - name: Test Release Version Helper
        run: python3 -m unittest scripts.test_release_version

      # Run Gradle tests
      - name: Run Tests
        run: ./gradlew test

      # Collect test results of failed tests
      - name: Collect Tests Result
        if: ${{ failure() }}
        uses: actions/upload-artifact@v5
        with:
          name: tests-result
          path: ${{ github.workspace }}/build/reports/tests
