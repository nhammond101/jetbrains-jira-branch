# GitHub Actions Workflow for automatically releasing a new plugin version when
# commits are pushed to the main branch. The next version is determined by reading
# conventional commits since the last tag.
#
# GitHub Actions reference: https://help.github.com/en/actions

name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:

  # Determine version, build, and publish a GitHub release
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:

      # Free GitHub Actions Environment Disk Space
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      # Check out the full history so conventional commits can be read
      - name: Fetch Sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Set up the Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      # Ensure Gradle wrapper has execute permission on Linux runners
      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      # Setup Gradle (handles caching automatically)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # Verify Python release helper scripts are working
      - name: Test Python Release Helpers
        run: |
          python3 -m unittest scripts.test_release_version
          python3 -m unittest scripts.test_custom_plugin_repository

      # Read conventional commits to determine the next version
      - name: Determine Next Release Version
        id: version
        run: python3 scripts/release_version.py --github-output "$GITHUB_OUTPUT"

      # Log the release decision for debugging
      - name: Log Release Decision
        run: |
          echo "should_release=${{ steps.version.outputs.should_release }}"
          echo "version=${{ steps.version.outputs.version }}"
          echo "release_type=${{ steps.version.outputs.release_type }}"
          echo "previous_tag=${{ steps.version.outputs.previous_tag }}"
          echo "reason=${{ steps.version.outputs.reason }}"

      # Run Gradle tests before building the release artifact
      - name: Run Tests
        if: steps.version.outputs.should_release == 'true'
        run: ./gradlew test --stacktrace

      # Build the plugin with the determined version
      - name: Build Plugin
        if: steps.version.outputs.should_release == 'true'
        run: ./gradlew buildPlugin --stacktrace -PpluginVersion=${{ steps.version.outputs.version }}

      # Build updatePlugins.xml and bundle zip for a custom JetBrains plugin repository.
      - name: Build JetBrains Custom Repository
        if: steps.version.outputs.should_release == 'true'
        run: |
          python3 scripts/custom_plugin_repository.py \
            --version "${{ steps.version.outputs.version }}" \
            --zip-path "build/distributions/jira-branch-opener-${{ steps.version.outputs.version }}.zip" \
            --download-base-url "https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/gh-pages/jetbrains" \
            --output-dir build/jetbrains

      # Publish the custom repository contents under /jetbrains on the gh-pages branch.
      - name: Publish JetBrains Custom Repository
        if: steps.version.outputs.should_release == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_branch: gh-pages
          publish_dir: ./build/jetbrains
          destination_dir: jetbrains
          keep_files: true

      # Publish a GitHub release with the built artifacts
      - name: Create GitHub Release
        if: steps.version.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          gh release create "$tag" \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            --generate-notes \
            build/distributions/*.zip \
            build/libs/*.jar
